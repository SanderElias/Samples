name: moduleCache
description: setup node modules using pnpm caching
inputs:
  node-version:
    description: The node version to use for the module.
    default: '24.x'
runs:
  using: 'composite'
  steps:
    - name: Get pnpm version from package.json
      id: get-pnpm-version
      run: |
        node -e "const p=require('./package.json').packageManager||''; const v=(p.split('@')[1]||'10'); console.log('pnpm-version='+v)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ steps.get-pnpm-version.outputs.pnpm-version }}
    - name: Setup node
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node }}
        cache: 'pnpm'
    - name: Install dependencies
      run: |
        pnpm config set auto-install-peers false
        pnpm install
      shell: bash

