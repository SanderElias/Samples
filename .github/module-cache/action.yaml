name: moduleCache
description: setup node modules using pnpm caching
inputs:
  node-version:
    description: The node version to use for the module.
    default: '26.x'
runs:
  using: 'composite'
  steps:
    - name: Get pnpm version from package.json
      id: get-pnpm-version
      run: |
        package_manager=$(sed -nE 's/.*"packageManager"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' package.json | head -n1)
        pnpm_version=${package_manager#pnpm@}
        if [ -z "$pnpm_version" ] || [ "$pnpm_version" = "$package_manager" ]; then
          pnpm_version='10'
        fi
        echo "pnpm-version=$pnpm_version" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Install pnpm
      uses: pnpm/action-setup@v6.0.8
      with:
        version: ${{ steps.get-pnpm-version.outputs.pnpm-version }}
    - name: Setup node
      uses: actions/setup-node@v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
    - name: Install dependencies
      run: |
        pnpm config set auto-install-peers false
        pnpm install
      shell: bash
