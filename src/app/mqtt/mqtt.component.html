<authenticated-user-only>
  <details>
    <summary>Settings</summary>
    <div class="zigbee-prefixes">
      @for (pf of zigbeePrefixes; track $index) {
        <label>
          <input
            type="checkbox"
            [checked]="selectedPrefixes().includes(pf)"
            (change)="checkPf(pf)"
          />
          {{ pf ? pf : 'Alles' }}
        </label>
      }
    </div>
    <!--
      <div class="toolbar">
        <select (change)="selected.set($any($event.target).value)">
          @for (device of deviceList(); track device.name) {
            <option [value]="device.name">{{ device.name }}</option>
          }
        </select>
        <select (change)="filter.set($any($event.target).value)">
          @for (type of deviceTypes(); track type[0]) {
            <option [value]="type[0]">{{ type[1] }}</option>
          }
        </select>
        <label><input #sd type="checkbox" />show details</label>
      </div>
      -->
    <se-stacked-per [data]="powerUsage()" />
    <!--
      @if (sd.checked) {
        <div class="grid">
          <pretty-json [json]="selectedDevice.value()" />
          <pretty-json [json]="selectedDetails()" />
        </div>
      }
    -->
  </details>
  <div class="searchBar">
    <input
      type="search"
      class="search"
      placeholder="Search name or setting…"
      aria-label="Search devices"
      [value]="search().searchText"
      (input)="setSearchText($any($event.target).value)"
    />
    <button type="button" title="Clear search" (click)="setSearchText('')">✕</button>
    <div class="search-filters">
      @for (opt of search().booleanOptions; track opt.name) {
        <label>
          <input
            type="checkbox"
            [checked]="opt.value === true"
            (change)="setBooleanOption(opt.name, $any($event.target).checked ? true : undefined)"
          />
          {{ opt.description || opt.name }}
        </label>
      }
    </div>
  </div>
  <div class="devGrid">
    <se-pair-button [selectedPrefixes]="selectedPrefixes()" />

    @for (device of powerMetersFiltered(); track device.ieeeAddress) {
      <power-meter [ieeeAddress]="device.ieeeAddress" />
    }
  </div>
</authenticated-user-only>
