trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver
  - ast-v8-to-istanbul@1.0.2
minimumReleaseAgeExclude:
  - '@angular/*' # Exclude all packages under the @angular scope
  - '@schematics/angular' # Exclude the @schematics/angular package
  - '@angular-devkit/core'
  - '@angular-devkit/architect'
  - '@angular-devkit/schematics'
minimumReleaseAge: 2880 # Only install packages that are at least 2 days old
allowBuilds:
  '@parcel/watcher': false
  core-js: false
  esbuild: false
  lmdb: false
  msgpackr-extract: false
  sharp: false
nodeVersion: 26.1.0
engineStrict: true
resolutionmode: highest
